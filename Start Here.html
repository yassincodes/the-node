<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Node</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #333;
      line-height: 1.65;
      padding: 3rem 1.5rem;
      max-width: 440px;
      margin: 0 auto;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4a90e2;
      margin: 0 auto 2rem;
      animation: breathe 2.5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    h1 {
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 2.5rem;
      color: #111;
    }
    ol { list-style: none; counter-reset: step; }
    li {
      counter-increment: step;
      margin-bottom: 1.5rem;
      font-size: 15px;
      color: #444;
    }
    li::before {
      content: counter(step);
      display: inline-block;
      width: 24px;
      height: 24px;
      line-height: 24px;
      text-align: center;
      border-radius: 50%;
      background: #f0f0f0;
      font-size: 13px;
      margin-right: 10px;
      color: #666;
    }
    strong { color: #111; font-weight: 500; }
    .note {
      margin-top: 2rem;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="dot"></div>
  <h1>Start here</h1>
  <ol>
    <li>Double-click <strong>The Node</strong></li>
    <li>Choose your passphrase</li>
    <li>Wait while it builds on this Mac</li>
  </ol>
  <p class="note">Then open <strong>The Node</strong> from Applications anytime.</p>
</body>
</html>
