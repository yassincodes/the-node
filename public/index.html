<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Node</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    nav {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 10;
      display: flex;
      gap: 1.75rem;
      padding: 1.5rem 2rem;
    }

    nav a, nav button {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #888;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    nav a:hover, nav button:hover { color: #333; }

    .node {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 10px;
      height: 10px;
      margin: -5px 0 0 -5px;
      border-radius: 50%;
      background: #4a90e2;
      animation: breathe 2.5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(0.85); }
    }
  </style>
</head>
<body>
  <nav>
    <a href="https://github.com/yassincodes/the-node" target="_blank" rel="noopener">Learn more</a>
    <button type="button" id="adopt">Adopt</button>
  </nav>

  <div class="node" aria-hidden="true"></div>

  <script src="adopt.js"></script>
  <script>
    document.getElementById("adopt").addEventListener("click", function () {
      TheNodeAdopt.detect().then(function (hw) {
        TheNodeAdopt.adopt(hw);
      });
    });
  </script>
</body>
</html>
