<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      color: #b0b0b0;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      line-height: 1.85;
      font-size: 0.85rem;
    }

    nav {
      position: fixed;
      top: 0;
      right: 0;
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem 2rem;
      z-index: 10;
    }

    nav a {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
    }

    nav a:hover { color: #39ff14; }
    nav a.primary { color: #39ff14; }

    main {
      max-width: 36rem;
      margin: 0 auto;
      padding: 6rem 2rem 4rem;
    }

    h1 {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: #39ff14;
      font-weight: 400;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .tagline {
      color: #555;
      font-size: 0.75rem;
      margin-bottom: 2.5rem;
      font-style: italic;
    }

    h2 {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 2.5rem 0 1rem;
      font-weight: 400;
    }

    p { margin-bottom: 1.2rem; color: #999; }
    .dim { color: #555; font-size: 0.75rem; }

    ul {
      list-style: none;
      margin: 1rem 0 1.5rem;
      color: #777;
      font-size: 0.8rem;
    }

    ul li {
      padding: 0.35rem 0;
      padding-left: 1rem;
      border-left: 1px solid #1a1a1a;
      margin-bottom: 0.5rem;
    }

    a.back {
      display: block;
      margin-top: 4rem;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.15em;
      text-decoration: none;
    }

    a.back:hover { color: #555; }

    .waiting {
      color: #333;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="learn.html">Learn</a>
    <a href="index.html" class="primary">Adopt yours</a>
  </nav>

  <main>
    <h1>History</h1>
    <div id="history-layer"><p class="waiting">…</p></div>
    <a class="back" href="learn.html">← learn</a>

  <script src="layer.js"></script>
  <script>TheNodeLayer.load("history", "history-layer");</script>
