<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Node</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #333;
      line-height: 1.6;
      padding: 3rem 1.5rem;
      max-width: 420px;
      margin: 0 auto;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4a90e2;
      margin: 0 auto 2rem;
    }
    h1 {
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 2.5rem;
      color: #111;
    }
    ol {
      list-style: none;
      counter-reset: step;
    }
    li {
      counter-increment: step;
      margin-bottom: 1.75rem;
      font-size: 14px;
      color: #444;
    }
    li::before {
      content: counter(step);
      display: inline-block;
      width: 22px;
      height: 22px;
      line-height: 22px;
      text-align: center;
      border-radius: 50%;
      background: #f0f0f0;
      font-size: 12px;
      margin-right: 10px;
      color: #666;
    }
    strong { color: #111; font-weight: 500; }
    .note {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="dot"></div>
  <h1>Start here</h1>
  <ol>
    <li>Double-click <strong>Install The Node</strong></li>
    <li>Click <strong>Install</strong></li>
    <li>If Mac says it cannot open it: open <strong>System Settings → Privacy &amp; Security</strong>, scroll down, click <strong>Open Anyway</strong>, then try again</li>
  </ol>
  <p class="note">This only happens once. After that, The Node opens normally.</p>
</body>
</html>
